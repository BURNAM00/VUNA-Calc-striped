<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student ID - Ezike Chinedu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .id-card {
      width: 340px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .id-card-header {
      background-color: #003366;
      color: white;
      padding: 16px;
      text-align: center;
    }

    .id-card-header img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;
      margin-bottom: 10px;
    }

    .id-card-header h5 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .id-card-header small {
      font-size: 0.75rem;
      opacity: 0.85;
    }

    .id-card-body {
      background: white;
      padding: 20px;
    }

    .id-card-body .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #888;
      font-weight: 600;
    }

    .id-card-body .value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #222;
      margin-bottom: 12px;
    }

    .id-card-footer {
      background-color: #003366;
      padding: 12px 20px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="id-card">
    <!-- Header -->
    <div class="id-card-header">
      <img src="https://ui-avatars.com/api/?name=Ezike+Chinedu&background=ffffff&color=003366&size=128" alt="Avatar"/>
      <h5>VERITAS UNIVERSITY ABUJA</h5>
      <small>Faculty of Natural Sciences</small>
    </div>

    <!-- Body -->
    <div class="id-card-body">
      <div class="label">Full Name</div>
      <div class="value">EZIKE CHINEDU KINGSLEY</div>

      <div class="label">Matric Number</div>
      <div class="value">VUG/SEN/22/8449</div>

      <div class="label">Department</div>
      <div class="value">Software Engineering</div>

      <div class="label">Level</div>
      <div class="value">400</div>
    </div>

    <!-- Footer Button -->
    <div class="id-card-footer">
      <a href="calculator/" class="btn btn-light btn-sm fw-semibold w-100">
        🧮 Open Calculator
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
